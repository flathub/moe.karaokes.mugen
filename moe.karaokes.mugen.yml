app-id: moe.karaokes.mugen
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: km-wrapper
separate-locales: false
finish-args:
  - --filesystem=~/KaraokeMugen:create
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --filesystem=xdg-run/app/com.discordapp.DiscordCanary:create
  - --share=ipc
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --device=all
  - --own-name=org.mpris.MediaPlayer2.KaraokeMugen.*
  - --talk-name=org.gnome.SessionManager
  - --share=network
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.dbusmenu
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=LC_NUMERIC=C
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
cleanup:
  - '*.la'
  - '*.a'
modules:
  - name: parse-yapp
    buildsystem: simple
    build-commands:
      - perl Makefile.PL INSTALL_BASE=/app
      - make
      - make install
    sources:
      - type: archive
        url: >-
          https://cpan.metacpan.org/authors/id/W/WB/WBRASWELL/Parse-Yapp-1.21.tar.gz
        sha256: 3810e998308fba2e0f4f26043035032b027ce51ce5c8a52a8b8e340ca65f13e5
  - name: libXmu
    buildsystem: autotools
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/xorg/lib/libxmu.git
        tag: libXmu-1.3.1
        commit: cdf280f6611932f79ab872832974e8043b1cad6d
        x-checker-data:
          type: git
          tag-pattern: ^libXmu-([\d.]+)$
  - name: xclip
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/astrand/xclip.git
        tag: '0.13'
        commit: 9aa7090c3b8b437c6489edca32ae43d82e0c1281
        x-checker-data:
          type: git
          tag-pattern: ^(\d+\.\d+)$
  - name: libXpresent
    buildsystem: autotools
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/xorg/lib/libxpresent.git
        tag: libXpresent-1.0.2
        commit: 4d92149372461bf575e8a09b1064a2884c38c3aa
        x-checker-data:
          type: git
          tag-pattern: ^libXpresent-([\d.]+)$
  - name: luajit
    no-autogen: true
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://github.com/LuaJIT/LuaJIT.git
        disable-shallow-clone: true
        commit: 7152e15489d2077cd299ee23e3d51a4c599ab14f
      - type: shell
        commands:
          - sed -i 's|/usr/local|/app|' ./Makefile
  - name: uchardet
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_STATIC=0
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: >-
          https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz
        sha256: e97a60cfc00a1c147a674b097bb1422abd9fa78a2d9ce3f3fdcc2e78a34ac5f0
        x-checker-data:
          type: html
          url: https://www.freedesktop.org/software/uchardet/releases/
          version-pattern: uchardet-(\d\.\d+\.?\d*).tar.xz
          url-template: >-
            https://www.freedesktop.org/software/uchardet/releases/uchardet-$version.tar.xz
  - name: libass
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - --disable-static
      - --enable-asm
      - --enable-harfbuzz
      - --enable-fontconfig
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: 0.17.4
        commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
        x-checker-data:
          type: git
          tag-pattern: ^(\d\.\d{1,3}\.\d{1,2})$
  - name: zimg
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/sekrit-twc/zimg/tarball/release-3.0.6
        sha256: 15140e491c4ce9db5f02a038d8a1eb53e9151b55eeed06a2899425a6ebfef367
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sekrit-twc/zimg/releases/latest
          url-query: .tarball_url
          version-query: .tag_name | sub("^release-"; "")
          timestamp-query: .published_at
  - name: Tesseract
    config-opts:
      - --disable-static
    modules:
      - name: Leptonica
        config-opts:
          - --disable-static
          - --with-pic
        sources:
          - type: archive
            url: http://www.leptonica.org/source/leptonica-1.87.0.tar.gz
            sha256: c73363397f96eb1295602bf44d708a994ad42046c791bf03ea0505d829bdb6a7
            x-checker-data:
              type: anitya
              project-id: 1549
              stable-only: true
              url-template: http://www.leptonica.org/source/leptonica-$version.tar.gz
        cleanup:
          - /bin
    sources:
      - type: git
        url: https://github.com/tesseract-ocr/tesseract.git
        tag: 5.5.2
        commit: 6e1d56a847e697de07b38619356550e5cf4e8633
        x-checker-data:
          type: json
          url: https://api.github.com/repos/tesseract-ocr/tesseract/releases/latest
          timestamp-query: .published_at
          tag-query: .tag_name
          version-query: .tag_name
    cleanup:
      - /bin
  - name: ImageMagick
    config-opts:
      - --disable-static
      - --disable-docs
      - --with-hdri
      - --with-pic
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/7.1.2-21.tar.gz
        sha256: 4ba5b81797910efa93e65fb5a02b496284b8069d64513c6d2687c80d180dd70f
        x-checker-data:
          type: anitya
          project-id: 1372
          stable-only: true
          url-template: https://github.com/ImageMagick/ImageMagick/archive/$version.tar.gz
    cleanup:
      - /bin
      - /etc
      - /lib/ImageMagick*
      - /share/ImageMagick*
  - name: rubberband
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/breakfastquay/rubberband.git
        tag: v4.0.0
        commit: 1d95888bec3ae0a17c0c4af791810d5a63f6bc35
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
  - name: mujs
    buildsystem: autotools
    no-autogen: true
    make-args:
      - release
    make-install-args:
      - prefix=/app
      - install-shared
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://codeberg.org/ccxvii/mujs.git
        tag: 1.3.8
        commit: 307f18c4216420f2f56e22d8e7040baa39a6304a
        x-checker-data:
          type: git
          url: https://codeberg.org/api/v1/repos/ccxvii/mujs/tags
          tag-pattern: ^([\d.]+)$
      # The unicode character database files are downloaded in the makefile rules `UnicodeData.txt` and `SpecialCasing.txt`.
      # This does not work with flatpak because there is no network access during the build step.
      #
      # TODO: check for updated urls when updating mujs
      - type: file
        url: https://www.unicode.org/Public/16.0.0/ucd/UnicodeData.txt
        sha256: ff58e5823bd095166564a006e47d111130813dcf8bf234ef79fa51a870edb48f

      - type: file
        url: https://www.unicode.org/Public/16.0.0/ucd/SpecialCasing.txt
        sha256: 8d5de354eef79f2395a54c9c7dcebbaf3d30fc962d0f85611ea97aa973a0c451
  - name: nv-codec-headers
    cleanup:
      - '*'
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    sources:
      - type: git
        url: https://github.com/FFmpeg/nv-codec-headers.git
        tag: n13.0.19.0
        commit: e844e5b26f46bb77479f063029595293aa8f812d
        x-checker-data:
          type: git
          tag-pattern: ^n([\d.]+)$
  - name: x264
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
    config-opts:
      - --disable-cli
      - --enable-shared
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        commit: b35605ace3ddf7c1a5d67a2eb553f034aef41d55
        # Every commit to the stable branch is considered a release
        # https://code.videolan.org/videolan/x264/-/issues/35
        # the check is disabled to satisfy the pipeline
        # x-checker-data:
        #   type: json
        #   url: https://code.videolan.org/api/v4/projects/536/repository/branches/stable
        #   commit-query: .commit.id
        #   version-query: .commit.short_id
        #   timestamp-query: .commit.created_at
  - name: x265
    buildsystem: cmake
    subdir: source
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_STATIC=0
      # TODO can be removed when updating to x265 > 4.1
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: git
        url: https://bitbucket.org/multicoreware/x265_git.git
        tag: '4.2'
        commit: e444744c03978c1fb4e037168967020cf2648427
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

      # fix cmake build issue
      # https://bitbucket.org/multicoreware/x265_git/commits/b354c009a60bcd6d7fc04014e200a1ee9c45c167
      - type: patch
        path: patches/x265-cmake_policy.patch
  - name: libmysofa
    buildsystem: cmake
    config-opts:
      - -DBUILD_TESTS=OFF
    sources:
      - type: git
        commit: 7a0c07111a3d7230ec534e08925c24a7525f33c0
        tag: v1.3.4
        url: https://github.com/hoene/libmysofa.git
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
  - name: libbs2b
    buildsystem: autotools
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        archive-type: tar
        url: >-
          https://downloads.sourceforge.net/sourceforge/bs2b/libbs2b-3.1.0.tar.gz
        sha256: 6aaafd81aae3898ee40148dd1349aab348db9bfae9767d0e66e0b07ddd4b2528
        x-checker-data:
          type: html
          url: https://sourceforge.net/projects/bs2b/files/libbs2b/
          version-pattern: projects/bs2b/files/libbs2b/(\d+\.\d+\.\d+)
          url-template: >-
            https://downloads.sourceforge.net/sourceforge/bs2b/libbs2b-$version.tar.gz
      - type: shell
        commands:
          - sed -i -e 's/lzma/xz/g' configure.ac
          - autoreconf -vif
  - name: ffmpeg
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/ffmpeg/examples
    config-opts:
      - --disable-debug
      - --disable-doc
      - --disable-static
      - --enable-encoder=png
      - --enable-gnutls
      - --enable-gpl
      - --enable-shared
      - --enable-version3
      - --enable-libaom
      - --enable-libass
      - --enable-libbs2b
      - --enable-libdav1d
      - --enable-libfreetype
      - --enable-libmp3lame
      - --enable-libopus
      - --enable-libjxl
      - --enable-libmysofa
      - --enable-libtheora
      - --enable-libvorbis
      - --enable-libvpx
      - --enable-libx264
      - --enable-libx265
      - --enable-libwebp
      - --enable-libxml2
      - --enable-vulkan
      - --enable-libdrm
      - --enable-vaapi
    post-install:
      - install -d /app/km
      - install -d /app/km/app/
      - install -d /app/km/app/bin
      - mv /app/bin/ffmpeg /app/km/app/bin/ffmpeg
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg.git
        commit: 9047fa1b084f76b1b4d065af2d743df1b40dfb56
        tag: n8.1
        x-checker-data:
          type: git
          tag-pattern: ^n([\d.]{3,7})$
  - name: libsixel
    buildsystem: autotools
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/saitoha/libsixel/tarball/v1.8.7-r1
        sha256: 516fad226f024b880886b9221385aa0b4c1c39174cc9e340eca48eafcd1f4296
        x-checker-data:
          type: json
          url: https://api.github.com/repos/saitoha/libsixel/releases/latest
          url-query: .tarball_url
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
  - name: vapoursynth
    config-opts:
      - --with-python-prefix=${FLATPAK_DEST}
    sources:
      - type: archive
        # without the dest-filename, flatpak-builder throws an "Unknown archive format" error
        dest-filename: vapoursynth.tar.gz
        url: https://api.github.com/repos/vapoursynth/vapoursynth/tarball/R75
        sha256: be5644c22212d391fc1ded371ed1506b9e7c3ff21fbd51bd734f7e069f29c382
        x-checker-data:
          type: json
          url: https://api.github.com/repos/vapoursynth/vapoursynth/releases/latest
          version-query: .name
          timestamp-query: .published_at
          url-query: .tarball_url
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=enabled
      - -Dshaderc=enabled
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        #mirror-urls:
        #  - https://code.videolan.org/videolan/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
  - name: hwdata
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/vcrhonek/hwdata/archive/refs/tags/v0.394.tar.gz
        sha256: b7c3fd7214a3b7c49d2661db127a712dc11cffd1799f793947aa1cb20aaf3298
  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: archive
        url: >-
          https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/0.2.0/libdisplay-info-0.2.0.tar.gz
        sha256: f7331fcaf5527251b84c8fb84238d06cd2f458422ce950c80e86c72927aa8c2b
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dalsa=enabled
      - -Dbuild-date=false
      - -Dcdda=disabled
      - -Dcplayer=true
      - -Dcplugins=enabled
      - -Dcuda-hwaccel=enabled
      - -Dcuda-interop=enabled
      - -Ddmabuf-wayland=enabled
      - -Ddrm=enabled
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Degl-drm=enabled
      - -Degl-wayland=enabled
      - -Degl-x11=enabled
      - -Degl=enabled
      - -Dgbm=enabled
      - -Dgl-x11=enabled
      - -Dgl=enabled
      - -Diconv=enabled
      - -Djack=enabled
      - -Djavascript=enabled
      - -Djpeg=enabled
      - -Dlcms2=enabled
      - -Dlibarchive=enabled
      - -Dlibavdevice=enabled
      - -Dlibbluray=disabled
      - -Dlibmpv=true
      - -Dlua=enabled
      - -Dopenal=enabled
      - -Dpipewire=enabled
      - -Dplain-gl=enabled
      - -Dpulse=enabled
      - -Drubberband=enabled
      - -Duchardet=enabled
      - -Dvaapi-drm=enabled
      - -Dvaapi-wayland=enabled
      - -Dvaapi-x11=enabled
      - -Dvaapi=enabled
      - -Dvapoursynth=enabled
      - -Dvdpau-gl-x11=enabled
      - -Dvdpau=enabled
      - -Dvector=enabled
      - -Dvulkan=enabled
      - -Dwayland=enabled
      - -Dwerror=false
      - -Dx11=enabled
      - -Dxv=enabled
      - -Dzimg=enabled
      - -Dzlib=enabled
    cleanup:
      - /include
      - /lib/pkgconfig
    post-install:
      - install -d /app/km
      - install -d /app/km/app/
      - install -d /app/km/app/bin
      - mv /app/bin/mpv /app/km/app/bin/mpv
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
  - name: ed
    build-options:
      no-debuginfo: true
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/ed/ed-1.22.5.tar.lz
        mirror-urls:
          - https://mirrors.kernel.org/gnu/ed/ed-1.20.1.tar.lz
          - https://mirrors.ocf.berkeley.edu/gnu/ed/ed-1.20.1.tar.lz
          - https://ftpmirror.gnu.org/gnu/ed/ed-1.20.1.tar.lz
        sha256: 56e107ddc2f29dad6690376c15bf9751509e1ee3b8241710e44edbe5c3a158cc
        x-checker-data:
          type: html
          url: https://ftp.gnu.org/gnu/ed/
          version-pattern: ed-(\d\.\d+\.?\d*).tar.lz
          url-template: https://ftp.gnu.org/gnu/ed/ed-$version.tar.lz
  - name: bc
    build-options:
      no-debuginfo: true
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/bc/bc-1.08.2.tar.gz
        mirror-urls:
          - https://mirrors.kernel.org/gnu/bc/bc-1.07.1.tar.gz
          - https://mirrors.ocf.berkeley.edu/gnu/bc/bc-1.07.1.tar.gz
          - https://ftpmirror.gnu.org/gnu/bc/bc-1.07.1.tar.gz
        sha256: ae470fec429775653e042015edc928d07c8c3b2fc59765172a330d3d87785f86
        x-checker-data:
          type: html
          url: https://ftp.gnu.org/gnu/bc/
          version-pattern: bc-(\d\.\d+\.?\d*).tar.gz
          url-template: https://ftp.gnu.org/gnu/bc/bc-$version.tar.gz
  - name: python_dateutil
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app six*.whl python_dateutil*.whl
    sources:
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/b7/ce/149a00dd41f10bc29e5921b496af8b574d8413afcd5e30dfa0ed46c2cc5e/six-1.17.0-py2.py3-none-any.whl
        sha256: 4721f391ed90541fddacab5acf947aa0d3dc7d27b2e1e8eda2be8970586c3274
        x-checker-data:
          type: pypi
          name: six
          packagetype: bdist_wheel
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/ec/57/56b9bcc3c9c6a792fcbaf139543cee77261f3651ca9da0c93f5c1221264b/python_dateutil-2.9.0.post0-py2.py3-none-any.whl
        sha256: a8b2bc7bffae282281c8140a97d3aa9c14da0b136dfe83f850eea9a5f7470427
        x-checker-data:
          type: pypi
          name: python_dateutil
          packagetype: bdist_wheel
  - name: urllib3
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app urllib3*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/39/08/aaaad47bc4e9dc8c725e68f9d04865dbcb2052843ff09c97b08904852d84/urllib3-2.6.3-py3-none-any.whl
        sha256: bf272323e553dfb2e87d9bfd225ca7b0f467b919d7bbd355436d3fd37cb0acd4
        x-checker-data:
          type: pypi
          name: urllib3
          packagetype: bdist_wheel
  - name: soupsieve
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app soupsieve*.whl
    sources:
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/46/2c/1462b1d0a634697ae9e55b3cecdcb64788e8b7d63f54d923fcd0bb140aed/soupsieve-2.8.3-py3-none-any.whl
        sha256: ed64f2ba4eebeab06cc4962affce381647455978ffc1e36bb79a545b91f45a95
        x-checker-data:
          type: pypi
          name: soupsieve
          packagetype: bdist_wheel
  - name: rebulk
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app rebulk-*.whl
    sources:
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/84/4d/df073d593f7e7e4a5a7e19148b2e9b4ae63b4ddcbb863f1e7bb2b6f19c62/rebulk-3.2.0-py3-none-any.whl
        sha256: 6bc31ae4b37200623c5827d2f539f9ec3e52b50431322dad8154642a39b0a53e
        x-checker-data:
          type: pypi
          name: rebulk
          packagetype: bdist_wheel
  - name: pbr
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app pbr-*.whl
    sources:
      - type: file
