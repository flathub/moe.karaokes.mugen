      - /share/man
    config-opts:
      - --disable-cli
      - --enable-shared
    sources:
      - type: git
        url: https://github.com/mirror/x264.git
        commit: 31e19f92f00c7003fa115047ce50978bc98c3a0d
  - name: x265
    buildsystem: cmake
